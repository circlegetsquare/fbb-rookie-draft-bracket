<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach Norman Dale Memorial League Rookie Draft Bracket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500;600&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Inline critical loader styles for instant display */
    .loading-overlay {
      display: flex;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0e14;
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 1.5rem;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #243040;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text {
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8899aa;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading Overlay (shows immediately) -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">Loading Data...</div>
  </div>

  <header class="header">
    <div class="header-top">
      <div>
        <h1>Coach Norman Dale Memorial League <span>Rookie Draft Bracket</span></h1>
        <p class="header-subtitle" id="headerSubtitle">Loading...</p>
      </div>
      <div style="display:flex; align-items:center; gap:1rem;">
        <span class="header-meta" id="headerMeta">Loading...</span>
      </div>
    </div>
  </header>

  <!-- Seed chips (populated by JS) -->
  <div class="seedings" id="seedings"></div>

  <div class="bracket-container">
    <!-- Round 1 -->
    <div class="round-section" id="round1"></div>
    <!-- Round 2 -->
    <div class="round-section" id="round2"></div>
    <!-- Finals -->
    <div class="round-section" id="round3"></div>
  </div>

  <footer class="footer">
    <span id="footerInfo">Loading...</span>
    <span id="cacheInfo">Loading...</span>
  </footer>

  <script>
    const CAT_ORDER = ['FG%', 'FT%', '3PM', 'REB', 'AST', 'STL', 'BLK', 'PTS'];

    function formatValue(cat, val) {
      if (cat === 'FG%' || cat === 'FT%') {
        return (val * 100).toFixed(2) + '%';
      }
      return Math.floor(val);
    }

    function formatLastUpdated(timestamp) {
      const date = new Date(timestamp * 1000);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);

      // Format relative time
      let relativeTime;
      if (diffMins < 1) {
        relativeTime = 'just now';
      } else if (diffMins === 1) {
        relativeTime = '1 minute ago';
      } else if (diffMins < 60) {
        relativeTime = `${diffMins} minutes ago`;
      } else {
        const diffHours = Math.floor(diffMins / 60);
        if (diffHours === 1) {
          relativeTime = '1 hour ago';
        } else if (diffHours < 24) {
          relativeTime = `${diffHours} hours ago`;
        } else {
          const diffDays = Math.floor(diffHours / 24);
          relativeTime = diffDays === 1 ? '1 day ago' : `${diffDays} days ago`;
        }
      }

      // Format absolute time in user's local timezone
      const timeStr = date.toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
        timeZoneName: 'short'
      });

      return `Last Updated ${relativeTime} at ${timeStr}`;
    }

    function renderMatchup(m, rnd) {
      const hasResult = m.is_complete || m.is_live;
      const statusClass = m.is_complete ? 'completed' : (m.is_live ? 'live' : 'pending');

      // Determine which team goes on top (higher seed = lower number)
      const aOnTop = m.team_a_seed < m.team_b_seed;
      const top = aOnTop
        ? { name: m.team_a_name, seed: m.team_a_seed, wins: m.wins_a, oppWins: m.wins_b }
        : { name: m.team_b_name, seed: m.team_b_seed, wins: m.wins_b, oppWins: m.wins_a };
      const bot = aOnTop
        ? { name: m.team_b_name, seed: m.team_b_seed, wins: m.wins_b, oppWins: m.wins_a }
        : { name: m.team_a_name, seed: m.team_a_seed, wins: m.wins_a, oppWins: m.wins_b };

      let html = `<div class="matchup-card ${statusClass}">`;

      // Label + live badge
      if (m.label || m.is_live) {
        html += `<div class="matchup-label">${m.label}`;
        if (m.is_live) html += `<span class="live-badge">LIVE</span>`;
        html += `</div>`;
      }

      // Top team row (higher seed)
      const topClass = hasResult ? (m.winner_name === top.name ? 'winner' : 'loser') : '';
      const topScore = top.wins !== null ? `${top.wins}-${top.oppWins}-${m.ties}` : '–';
      html += `
        <div class="team-row ${topClass}">
          <div class="team-seed">${top.seed}</div>
          <div class="team-name" title="${top.name}">${top.name}</div>
          <div class="team-score">${topScore}</div>
        </div>`;

      // Bottom team row (lower seed)
      const botClass = hasResult ? (m.winner_name === bot.name ? 'winner' : 'loser') : '';
      const botScore = bot.wins !== null ? `${bot.wins}-${bot.oppWins}-${m.ties}` : '–';
      html += `
        <div class="team-row ${botClass}">
          <div class="team-seed">${bot.seed}</div>
          <div class="team-name" title="${bot.name}">${bot.name}</div>
          <div class="team-score">${botScore}</div>
        </div>`;

      // Tiebreak badge
      if (m.is_tiebreak) {
        html += `<div class="tiebreak-badge">Tiebreak: better seed</div>`;
      }

      // Computed badge
      if (m.is_complete && !m.espn_matched) {
        html += `<div class="computed-badge">Computed from raw stats</div>`;
      }

      // Two-week progress
      if (rnd && rnd.is_two_week && !m.is_complete && rnd.week1_progress) {
        for (const p of rnd.week1_progress) {
          if (p.team_a_name === m.team_a_name && p.team_b_name === m.team_b_name) {
            html += `
              <div class="progress-bar-container">
                <div class="progress-label">${p.week_label}: ${p.wins_a}-${p.wins_b}-${p.ties}</div>
                <div class="progress-dots">
                  <div class="progress-dot filled"></div>
                  <div class="progress-dot"></div>
                </div>
              </div>`;
          }
        }
      }

      // Category details
      if (m.details && m.details.length > 0) {
        const detailsMap = {};
        for (const [cat, scoreA, scoreB, result] of m.details) {
          detailsMap[cat] = { scoreA, scoreB, result };
        }

        html += `<div class="cat-details">
          <div class="cat-header">
            <div class="cat-header-spacer"></div>
            <div class="cat-header-name">${top.name}</div>
            <div class="cat-header-name">${bot.name}</div>
          </div>`;

        for (const cat of CAT_ORDER) {
          if (detailsMap[cat]) {
            const d = detailsMap[cat];
            // Swap scores if needed to match top/bottom order
            const topScore = aOnTop ? d.scoreA : d.scoreB;
            const botScore = aOnTop ? d.scoreB : d.scoreA;
            const topResult = aOnTop ? d.result : (d.result === 'W' ? 'L' : (d.result === 'L' ? 'W' : 'T'));
            const botResult = aOnTop ? (d.result === 'W' ? 'L' : (d.result === 'L' ? 'W' : 'T')) : d.result;
            const classTop = topResult === 'W' ? 'win' : (topResult === 'L' ? 'loss' : 'tie');
            const classBot = botResult === 'W' ? 'win' : (botResult === 'L' ? 'loss' : 'tie');
            html += `
              <div class="cat-row">
                <div class="cat-name">${cat}</div>
                <div class="cat-val ${classTop}">${formatValue(cat, topScore)}</div>
                <div class="cat-val ${classBot}">${formatValue(cat, botScore)}</div>
              </div>`;
          }
        }

        html += `</div>
          <button class="cat-toggle">Categories <span class="arrow">&#x25BC;</span></button>`;
      } else if (!m.is_complete) {
        const label = (rnd && rnd.is_two_week && rnd.week1_progress) ? 'In Progress' : 'Pending';
        html += `<div class="pending-label">${label}</div>`;
      }

      html += `</div>`;
      return html;
    }

    function renderRound(container, rnd, roundNum, title, fallbackWeek, fallbackDuration, fallbackMsg) {
      let html = '';
      if (rnd) {
        html = `<div class="round-header">${title} <span class="week">${rnd.week_label} &middot; ${rnd.duration_label}</span></div>
          <div class="matchup-grid">`;
        for (const m of rnd.matchups) {
          html += renderMatchup(m, rnd);
        }
        html += `</div>`;
      } else {
        html = `<div class="round-header">${title} <span class="week">${fallbackWeek} &middot; ${fallbackDuration}</span></div>
          <div class="matchup-grid">
            <div class="matchup-card pending"><div class="pending-label">${fallbackMsg}</div></div>
            <div class="matchup-card pending"><div class="pending-label">${fallbackMsg}</div></div>
            <div class="matchup-card pending"><div class="pending-label">${fallbackMsg}</div></div>
            <div class="matchup-card pending"><div class="pending-label">${fallbackMsg}</div></div>
          </div>`;
      }
      container.innerHTML = html;
    }

    function renderBracket(data) {
      const { bracket, league_id, season, last_updated } = data;

      // Update header
      document.getElementById('headerSubtitle').textContent = `${season} Season · Seeds 5–12`;
      document.getElementById('headerMeta').textContent = `League ${league_id}`;
      document.getElementById('footerInfo').textContent = `ESPN League ${league_id} · ${season}`;

      // Update cache info
      document.getElementById('cacheInfo').textContent = formatLastUpdated(last_updated);

      // Render seed chips
      const seedingsEl = document.getElementById('seedings');
      seedingsEl.innerHTML = bracket.teams.map(t => `
        <div class="seed-chip">
          <span class="num">${t.seed}</span>
          <span>${t.name}</span>
          <span class="record">${t.record}</span>
        </div>
      `).join('');

      // Render rounds
      const r1 = bracket.rounds[0] || null;
      const r2 = bracket.rounds[1] || null;
      const r3 = bracket.rounds[2] || null;

      renderRound(document.getElementById('round1'), r1, 1, 'Round 1', 'Week 20', '1-week matchup', 'Pending');
      renderRound(document.getElementById('round2'), r2, 2, 'Round 2', 'Week 21', '1-week matchup', 'Awaiting Round 1');
      renderRound(document.getElementById('round3'), r3, 3, 'Finals', 'Weeks 22-23', '2-week matchup', 'Awaiting Round 2');
    }

    async function loadData() {
      try {
        const res = await fetch('data.json');
        const data = await res.json();
        renderBracket(data);
        document.getElementById('loadingOverlay').classList.add('hidden');
      } catch (err) {
        console.error('Failed to load bracket data:', err);
        document.getElementById('loadingText').textContent = 'Error loading data';
      }
    }

    // Initial load
    loadData();

    // Category toggle (delegated)
    document.addEventListener('click', function(e) {
      const toggle = e.target.closest('.cat-toggle');
      if (!toggle) return;
      const card = toggle.closest('.matchup-card');
      const details = card.querySelector('.cat-details');
      if (details) {
        details.classList.toggle('open');
        card.classList.toggle('expanded');
      }
    });
  </script>

</body>
</html>
